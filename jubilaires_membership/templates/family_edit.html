{% extends "base.html" %}

{% block title %}Edit Family - Fairfax Jubil-Aires Membership{% endblock %}

{% block content %}
<section class="page-heading">
  <h1>Edit Family</h1>
  <p><a href="/members/{{ member.id }}">{{ member.first_name }} {{ member.last_name }}</a></p>
</section>

<form class="edit-surface" action="/members/{{ member.id }}/family/{{ person.id }}/edit" method="post">
  <section class="detail-panel">
    <h2>{{ person.first_name }}{% if person.last_name %} {{ person.last_name }}{% endif %}</h2>
    <div class="form-grid">
      <label>
        First
        <input name="first_name" value="{{ person.first_name }}" required>
      </label>
      <label>
        Last
        <input name="last_name" value="{{ person.last_name or '' }}">
      </label>
      <label>
        Relationship
        <select name="relationship">
          {% for relationship in family_relationships %}
            <option value="{{ relationship }}" {% if person.relationship == relationship %}selected{% endif %}>{{ relationship|title }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Date of Birth
        <input type="date" name="date_of_birth" value="{{ person.date_of_birth or '' }}">
      </label>
      <label>
        Email
        <input type="email" name="email_address" value="{{ person.email_address or '' }}">
      </label>
      <label>
        Picture Path
        <input name="picture_path" value="{{ person.picture_path or '' }}">
      </label>
    </div>
    <label>
      Notes
      <textarea name="notes" rows="5">{{ person.notes or '' }}</textarea>
    </label>
    <div class="form-actions">
      <button type="submit">Save</button>
      <a class="button secondary-button" href="/members/{{ member.id }}">Cancel</a>
    </div>
  </section>
</form>
{% endblock %}
