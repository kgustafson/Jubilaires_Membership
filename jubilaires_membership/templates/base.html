<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Jubilaires Membership{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='membership.css') }}">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/">Jubilaires Membership</a>
    <nav class="top-nav">
      <a href="/">Dashboard</a>
      <a href="/members">Members</a>
    </nav>
  </header>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Membership navigation">
      <div class="sidebar-title">Roster</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a>
        <a class="sidebar-link {% if request.url.path.startswith('/members') %}active{% endif %}" href="/members">Members</a>
        <span class="sidebar-link disabled">Quartets</span>
        <span class="sidebar-link disabled">Voice Parts</span>
        <span class="sidebar-link disabled">Birthdays</span>
        <span class="sidebar-link disabled">Import Queue</span>
      </nav>
    </aside>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
