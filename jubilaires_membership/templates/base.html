<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fairfax Jubil-Aires Membership{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='membership.css') }}">
  <script src="{{ url_for('static', path='membership.js') }}" defer></script>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/">
      <span class="brand-mark">
        <img src="{{ url_for('static', path='brand/harmony-singers-logo.png') }}" alt="Fairfax Jubil-Aires logo">
      </span>
      <span class="brand-copy">
        <strong>Fairfax Jubil-Aires</strong>
        <small>Member Management</small>
      </span>
    </a>
    <div class="header-actions">
      <form class="header-search" action="/" method="get" data-roster-search-form>
        <label class="sr-only" for="header-member-search">Search members</label>
        <input id="header-member-search" type="search" name="q" placeholder="Search members" data-roster-search>
      </form>
      <div class="user-profile" aria-label="Current user">
        <span class="avatar">KG</span>
        <span>Admin</span>
      </div>
    </div>
  </header>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Membership navigation">
      <div class="sidebar-title">Management</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link {% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a>
        <span class="sidebar-link disabled">Attendance Tracking</span>
        <span class="sidebar-link disabled">Quartet Management</span>
        <span class="sidebar-link disabled">Dues Tracking</span>
        <span class="sidebar-link disabled">Communications</span>
        <span class="sidebar-link disabled">Reports</span>
        <span class="sidebar-link disabled">Admin Settings</span>
      </nav>
    </aside>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
