{% extends "base.html" %}

{% block title %}Login - Fairfax Jubil-Aires Membership{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1>Login</h1>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form class="stacked-form" action="/login" method="post">
    <input type="hidden" name="next" value="{{ next_url or '/' }}">
    <label>
      Username
      <input name="username" autocomplete="username" required>
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Login</button>
  </form>
  <p class="field-summary">Need access? <a href="/register">Register for an account</a>.</p>
</section>
{% endblock %}
