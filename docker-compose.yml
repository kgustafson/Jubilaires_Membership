services:

  db:
    image: postgres:16
    container_name: jubilaires_membership_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jubilaires_membership}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jubilaires}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "${JUBILAIRES_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-jubilaires_membership}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: jubilaires_membership_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${JUBILAIRES_ADMINER_PORT:-8081}:8080"

  app:
    build:
      context: .
    container_name: jubilaires_membership_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JUBILAIRES_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-jubilaires}@db:5432/${POSTGRES_DB:-jubilaires_membership}
      JUBILAIRES_SESSION_SECRET: ${JUBILAIRES_SESSION_SECRET:-local-dev-change-me}
      JUBILAIRES_DB_HOST: db
      JUBILAIRES_DB_PORT: "5432"
      JUBILAIRES_DB_NAME: ${POSTGRES_DB:-jubilaires_membership}
      JUBILAIRES_DB_USER: ${POSTGRES_USER:-admin}
      JUBILAIRES_DB_PASSWORD: ${POSTGRES_PASSWORD:-jubilaires}
    volumes:
      - ./jubilaires_membership/static/photos:/app/jubilaires_membership/static/photos
      - ./backups:/app/backups
    ports:
      - "${JUBILAIRES_APP_PORT:-8092}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
