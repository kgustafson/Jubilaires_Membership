services:

  db:
    image: postgres:16
    container_name: jubilaires_membership_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       jubilaires_membership
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: jubilaires
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jubilaires_membership"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: jubilaires_membership_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  app:
    build:
      context: .
    container_name: jubilaires_membership_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JUBILAIRES_DATABASE_URL: postgresql+psycopg2://admin:jubilaires@db:5432/jubilaires_membership
      JUBILAIRES_SESSION_SECRET: local-dev-change-me
      JUBILAIRES_DB_HOST: db
      JUBILAIRES_DB_PORT: "5432"
      JUBILAIRES_DB_NAME: jubilaires_membership
      JUBILAIRES_DB_USER: admin
      JUBILAIRES_DB_PASSWORD: jubilaires
    volumes:
      - ./jubilaires_membership/static/photos:/app/jubilaires_membership/static/photos
      - ./backups:/app/backups
    ports:
      - "8092:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
