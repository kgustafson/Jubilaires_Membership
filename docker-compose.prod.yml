services:

  db:
    image: postgres:16
    container_name: jubilaires_membership_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: jubilaires_membership_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JUBILAIRES_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JUBILAIRES_SESSION_SECRET: ${JUBILAIRES_SESSION_SECRET}
      JUBILAIRES_DB_HOST: db
      JUBILAIRES_DB_PORT: "5432"
      JUBILAIRES_DB_NAME: ${POSTGRES_DB}
      JUBILAIRES_DB_USER: ${POSTGRES_USER}
      JUBILAIRES_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./jubilaires_membership/static/photos:/app/jubilaires_membership/static/photos
      - ./backups:/app/backups
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: caddy:2
    container_name: jubilaires_membership_proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      JUBILAIRES_DOMAIN: ${JUBILAIRES_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
